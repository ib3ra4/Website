<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML CSS JS Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #f8f9fa, #d0e7ff);
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      padding: 24px;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #0056d4;
    }
    .message {
      margin-top: 16px;
      font-size: 18px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Simple Demo</h1>
    <p>Click the button to update the message.</p>
    <button id="updateButton">Update Message</button>
    <div class="message" id="message">Hello from HTML!</div>
  </div>

  <script>
    const button = document.getElementById('updateButton');
    const message = document.getElementById('message');

    button.addEventListener('click', () => {
      message.textContent = 'The HTML, CSS, and JavaScript are connected!';
      message.style.color = '#007bff';
    });
  </script>
</body>
</html>
